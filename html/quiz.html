<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPlay - Quiz Challenge!</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@700;800;900&family=Dancing+Script:wght@700&display=swap"
    rel="stylesheet">

  <!-- Three.js (for background) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/quiz.css">
</head>

<body>

  <!-- 3D Canvas Background -->
  <div id="canvas-container"></div>

  <!-- Loading Screen (Initial state) -->
  <div id="loadingScreen" class="overlay-screen loading-screen">
    <div class="loading-spinner"></div>
    <h2 class="text-gradient">Loading your adventure...</h2>
  </div>

  <!-- Story Intro Overlay (Injected dynamically but we provide container if needed, quiz.js handles it) -->

  <!-- Mood Checkin Overlay (quiz.js handles it) -->

  <!-- Main Quiz Container (Hidden initially) -->
  <div id="quizApp" style="display: none; width: 100%; height: 100%; display: flex; flex-direction: column;">
    <!-- Navbar -->
    <nav class="quiz-navbar">
      <div class="quiz-brand">
        🎓 <span class="text-gradient">EduPlay</span>
      </div>
      <div id="subjectPill" class="subject-pill">Subject</div>
      <button class="exit-btn" id="exitBtn">✖ Exit</button>
    </nav>

    <!-- Main Content -->
    <main class="quiz-main">
      <!-- HUD -->
      <div class="hud-row">
        <div class="hud-stats">
          <div id="scoreChip" class="chip score-chip">⭐ <span id="scoreVal">0</span> pts</div>
          <div id="timerChip" class="chip timer-chip">⏱ <span id="timerVal">30</span>s</div>
          <div id="streakChip" class="chip streak-chip">🔥 <span id="streakVal">3</span>x Streak!</div>
        </div>
        <div class="hud-lifelines">
          <button id="hintBtn" class="lifeline-btn" title="Get a Hint">💡</button>
          <button id="freezeBtn" class="lifeline-btn" title="Freeze Timer (10s)">❄️</button>
          <button id="fiftyFiftyBtn" class="lifeline-btn" title="50/50">✂️</button>
        </div>
      </div>

      <!-- Progress Tracker -->
      <div class="progress-tracker">
        <div class="dot-map" id="dotMap">
          <!-- Dots injected JS -->
        </div>
        <div class="progress-bar-container">
          <div id="progressBarFill" class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- Question Area -->
      <div id="questionWrapper">
        <div class="question-area">
          <div id="mascot" class="mascot-container">🦉</div>
          <div class="question-bubble">
            <div id="multiplierBadge" class="multiplier-badge">🔥 2x POINTS!</div>
            <div id="questionLabel" class="question-label">❓ Question 1 of 10</div>
            <div id="questionText" class="question-text">Loading question...</div>
          </div>
        </div>

        <!-- Options Grid -->
        <div class="options-grid" id="optionsGrid">
          <!-- Buttons injected by JS -->
        </div>

        <!-- Post-Answer Explanation Card -->
        <div id="explanationCard" class="post-answer-card">
          <div id="explanationHeader" class="feedback-header">
            <span id="explanationIcon">✨</span> <span id="explanationTitle">Explanation</span>
          </div>
          <div id="explanationBody" class="feedback-body">Loading feedback...</div>
          <div class="next-btn-container">
            <button id="nextQuestionBtn" class="next-btn">Next ➔</button>
          </div>
        </div>
      </div>

      <!-- Results Screen -->
      <div id="resultsScreen" class="results-screen">
        <div id="resultMascot" class="mascot-container" style="font-size: 6rem; margin-bottom: 1rem;">🏆</div>

        <div class="star-rating" id="starRatingContainer">
          <span id="star1">⭐</span>
          <span id="star2">⭐</span>
          <span id="star3">⭐</span>
        </div>

        <h1 id="resultTitle" class="text-gradient" style="margin-bottom: 0.5rem;">Legendary Explorer!</h1>
        <div id="finalScoreDisplay" class="final-score text-gradient-gold">0 pts</div>

        <div class="meta-chips">
          <div class="chip">✅ <span id="resultCorrect">0/10</span> Correct</div>
          <div class="chip">🎯 <span id="resultAccuracy">0%</span> Accuracy</div>
          <div class="chip" id="resultMoodChip">😊 Mood: Good</div>
        </div>

        <div id="moodInsightCard"
          style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 16px; margin-bottom: 1.5rem; display: none;">
          <strong style="color: var(--accent-gold);">💡 Insight:</strong> <span id="resultMoodInsight">Keep it
            up!</span>
        </div>

        <div class="review-bars" id="reviewBarsContainer">
          <!-- Bars injected via JS -->
        </div>

        <div class="results-actions">
          <button id="retakeBtn" class="btn-primary">🔄 Try Again!</button>
          <button id="homeBtn" class="btn-ghost">🏠 Back Home</button>
        </div>
      </div>

    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/groq.js"></script>
  <script src="../js/adaptive.js"></script>
  <script src="../js/quiz.js"></script>

</body>

</html>
